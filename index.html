<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>勝又十勝</title>
  <style>
    :root{--bg:#0f1724;--card-bg:#0b1220;--accent:#06b6d4;--glass:rgba(255,255,255,0.03)}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial}
    body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--bg),#071025);color:#e6eef6;padding:24px}
    .wrap{max-width:420px;width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:12px;padding:20px;box-shadow:0 8px 24px rgba(2,6,23,0.6);backdrop-filter:blur(6px)}
    h1{font-size:18px;margin:0 0 12px}
    .preview{display:flex;flex-direction:column;gap:12px;align-items:center}
    .card-frame{width:260px;max-width:100%;height:auto;border-radius:8px;overflow:hidden;border:1px solid var(--glass);background:#fff}
    .card-frame img{display:block;width:100%;height:auto}
    .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    button, a.button{appearance:none;border:0;padding:10px 14px;border-radius:8px;font-weight:600;cursor:pointer}
    .download{background:linear-gradient(90deg,var(--accent),#0891b2);color:#04202a}
    .link{background:transparent;color:var(--accent);border:1px solid rgba(255,255,255,0.06)}
    p.small{font-size:13px;opacity:0.8;margin:8px 0 0;text-align:center}
    .filename{word-break:break-all;font-size:13px;color:#cfeff6}
    @media (min-width:760px){.wrap{max-width:520px}}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- <h1>勝又十勝</h1> -->
    <div class="preview">
      <!-- ここに表示するPNGファイル名を指定します。GitHub Pagesでは同じリポジトリのルートにcard.pngを置くのが簡単です -->
      <div class="card-frame" id="cardFrame">
        <img id="cardImage" src="card.png" alt="名刺">
      </div>

      <div class="controls">
        <button class="download" id="downloadBtn">ダウンロード</button>
        <!-- ダウンロード属性付きのリンク(大半のブラウザで動作) -->
        <a id="directLink" class="button link" href="card.png" download="business-card.png">直接リンクで保存</a>
      </div>

      <!-- <p class="small">表示中のファイル: <span class="filename" id="fileName">card.png</span></p> -->
      <p class="small">* 自動で保存されない場合は、画像を右クリックして「画像を保存」してください。</p>
    </div>
  </div>

  <script>
    (function(){
      // 表示する画像ファイル名 (必要ならここを書き換えてください)
      const IMAGE_PATH = 'card.png';
      const SAVE_NAME = 'business-card.png';

      const img = document.getElementById('cardImage');
      const fileNameEl = document.getElementById('fileName');
      const downloadBtn = document.getElementById('downloadBtn');
      const directLink = document.getElementById('directLink');

      // 初期設定
      img.src = IMAGE_PATH;
      directLink.href = IMAGE_PATH;
      directLink.setAttribute('download', SAVE_NAME);
      fileNameEl.textContent = IMAGE_PATH;

      // ダウンロード処理: <a download> が効かない環境向けに fetch -> blob -> objectURL を使う
      async function downloadImage(){
        try{
          // まずはシンプルに<a download>で試す (多くのブラウザでOK)
          const a = document.createElement('a');
          a.href = IMAGE_PATH;
          a.download = SAVE_NAME;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          // 一部ブラウザやCORS環境で動作しない場合は fetch でバイナリを取得して保存
          // ここでは念のため2秒後に補助的なfetchを実行するが、既にダウンロードが始まっている場合は無害です。
          setTimeout(async ()=>{
            try{
              const response = await fetch(IMAGE_PATH, {mode: 'cors'});
              if(!response.ok) throw new Error('fetch error');
              const blob = await response.blob();
              const url = URL.createObjectURL(blob);
              const a2 = document.createElement('a');
              a2.href = url;
              a2.download = SAVE_NAME;
              document.body.appendChild(a2);
              a2.click();
              setTimeout(()=>{ URL.revokeObjectURL(url); if(a2.parentNode) a2.parentNode.removeChild(a2); }, 1500);
            }catch(e){
              // fetchが失敗したらユーザーに案内
              console.warn('補助ダウンロード失敗:', e);
            }
          }, 1200);

        }catch(err){
          console.error('ダウンロードに失敗しました', err);
          alert('ダウンロードに失敗しました。画像を右クリックして「名前を付けて保存」してください。');
        }
      }

      downloadBtn.addEventListener('click', downloadImage);

      // 画像が存在しない場合のフォールバック表示
      img.addEventListener('error', ()=>{
        document.getElementById('cardFrame').innerHTML = '<div style="padding:28px;text-align:center;color:#9fbec8">画像が見つかりません: '+IMAGE_PATH+'</div>';
      });

    })();
  </script>
</body>
</html>
